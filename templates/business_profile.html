{% extends "base_business.html" %}

{% block content %}

<style>
    .dashboard-header { margin-bottom: 24px; }
    .dashboard-header h2 { font-weight: 700; color: var(--dark); margin: 0; font-size: 24px; }
    .dashboard-header p { color: var(--text-gray); margin: 4px 0 0 0; font-size: 14px; }

    .profile-card {
        background: #ffffff;
        border-radius: 20px;
        padding: 32px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03);
        border: 1px solid var(--slate-border);
        max-width: 900px;
    }

    .profile-flex {
        display: flex;
        gap: 40px;
        align-items: flex-start;
    }

    /* AVATAR */
    .avatar-wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
    }

    .avatar {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        background: linear-gradient(135deg, #1d4ed8, #111827);
        color: white;
        font-size: 48px;
        font-weight: 700;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 4px solid #ffffff;
        box-shadow: 0 8px 20px rgba(29, 78, 216, 0.2);
    }
    
    .role-badge {
        background: var(--slate);
        border: 1px solid var(--slate-border);
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 11px;
        font-weight: 600;
        color: var(--primary);
        text-transform: uppercase;
        letter-spacing: 0.1em;
    }

    /* FORM SETTINGS */
    .profile-form { flex: 1; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
    .form-group { margin-bottom: 20px; }
    .form-label { display: block; font-size: 13px; font-weight: 600; color: var(--dark); margin-bottom: 8px; }
    
    .form-control {
        width: 100%; height: 48px; border-radius: 12px;
        border: 1px solid var(--slate-border); background: var(--slate);
        padding: 0 16px; font-size: 14px; transition: all 0.2s ease;
        color: var(--dark); box-sizing: border-box;
    }
    .form-control:focus { outline: none; border-color: var(--primary); background: #ffffff; box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }
    .form-control:read-only { background: rgba(0,0,0,0.02); color: var(--text-gray); cursor: not-allowed; }

    .btn-main {
        background: var(--primary); color: white; border: none;
        padding: 14px 28px; border-radius: 12px; font-weight: 600; font-size: 15px;
        transition: all 0.2s ease; margin-top: 12px; width: auto;
    }
    .btn-main:hover { background: #1d4ed8; transform: translateY(-1px); }

    .section-title {
        font-size: 16px; font-weight: 700; color: var(--dark); margin: 32px 0 16px 0;
        display: flex; align-items: center; gap: 8px;
    }
    .grid-icon { color: var(--primary); }

    @media(max-width: 768px) {
        .profile-flex { flex-direction: column; align-items: center; }
        .form-row { grid-template-columns: 1fr; }
    }
</style>

<div class="dashboard-header">
    <h2>Business Account Configuration</h2>
    <p>Manage your company profile, tax details, and administrative contact settings.</p>
</div>

<div class="profile-card">
    <div class="profile-flex">
        
        <!-- SIDE PANEL -->
        <div class="avatar-wrapper">
            <div class="avatar">
                {{ user[0][0]|upper if user else 'B' }}
            </div>
            <div class="role-badge">Enterprise</div>
        </div>

        <!-- FORM PANEL -->
        <div class="profile-form">
            
            <form action="/save_business_profile" method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <div class="section-title" style="margin-top: 0;">
                    <i class="bi bi-person-badge grid-icon"></i> Primary POC Details
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Admin Name</label>
                        <input type="text" class="form-control" value="{{ user[0] if user else '' }}" readonly>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Email Address</label>
                        <input type="text" class="form-control" value="{{ user[1] if user else '' }}" readonly>
                    </div>
                </div>

                <div class="section-title">
                    <i class="bi bi-building-gear grid-icon"></i> Company Information
                </div>

                <div class="form-group">
                    <label class="form-label">Registered Company Name</label>
                    <input type="text" name="company" class="form-control" placeholder="Acme Corp Pvt Ltd" value="{{ business[0] if business else '' }}" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">GSTIN Number</label>
                        <input type="text" name="gst" class="form-control" placeholder="22AAAAA0000A1Z5" value="{{ business[1] if business else '' }}" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Contact Number</label>
                        <input type="text" class="form-control" value="{{ user[2] if user else '' }}" readonly>
                    </div>
                </div>

                <div class="section-title">
                    <i class="bi bi-geo-alt grid-icon"></i> Registered Address
                </div>

                <div class="form-group">
                    <label class="form-label">Full Office Address</label>
                    <input type="text" name="address" class="form-control" placeholder="Suite 402, Business Park..." value="{{ business[2] if business else '' }}" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">City</label>
                        <input type="text" name="city" class="form-control" placeholder="e.g. Mumbai" value="{{ business[3] if business else '' }}" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">State</label>
                        <input type="text" name="state" class="form-control" placeholder="e.g. Maharashtra" value="{{ business[4] if business else '' }}" required>
                    </div>
                </div>

                <button type="submit" class="btn-main"><i class="bi bi-check-lg" style="margin-right: 8px;"></i> Update Business Profile</button>
            </form>

        </div>
    </div>
</div>

{% endblock %}
