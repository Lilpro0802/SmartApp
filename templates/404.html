<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Telesmart</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --dark: #0f172a;
            --light: #f8fafc;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            background: var(--dark);
            color: var(--light);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            overflow: hidden;
        }
        .container {
            position: relative;
            z-index: 1;
            padding: 2rem;
        }
        h1 {
            font-size: 15rem;
            margin: 0;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
            font-weight: 800;
        }
        h2 {
            font-size: 2rem;
            margin-bottom: 1rem;
        }
        p {
            color: #94a3b8;
            font-size: 1.1rem;
            max-width: 400px;
            margin: 0 auto 2rem;
        }
        .btn {
            display: inline-block;
            padding: 1rem 2rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
        }
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(99, 102, 241, 0.5);
        }
        /* Background Decorations */
        .circle {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, var(--primary), transparent);
            filter: blur(80px);
            opacity: 0.1;
            z-index: 0;
        }
        .c1 { width: 500px; height: 500px; top: -10%; left: -10%; }
        .c2 { width: 400px; height: 400px; bottom: -10%; right: -10%; background: var(--secondary); }
    </style>
</head>
<body>
    <div class="circle c1"></div>
    <div class="circle c2"></div>
    
    <div class="container">
        <h1>404</h1>
        <h2>Oops! Lost in Space?</h2>
        <p>The page you are looking for doesn't exist or has been moved. Let's get you back on track.</p>
        <a href="/" class="btn">Return to Home</a>
    </div>
</body>
</html>
