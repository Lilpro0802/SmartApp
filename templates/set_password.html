<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set Password - SmartApp</title>
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/static/images/logo1.png">
    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    
    <style>
        :root {
            --primary: #2563eb;
            --dark: #0f172a;
            --gray: #64748b;
        }
        body {
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
            opacity: 0; animation: fadeInBody 0.6s ease forwards;
        }
        @keyframes fadeInBody { from { opacity: 0; } to { opacity: 1; } }
        .auth-card {
            background: #ffffff;
            width: 100%;
            max-width: 440px;
            padding: 48px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.05);
        }
        .auth-logo { text-align: center; margin-bottom: 24px; }
        .auth-logo img { height: 60px; }
        h1 { font-size: 24px; font-weight: 700; color: var(--dark); text-align: center; margin-bottom: 8px; }
        .auth-subtitle { font-size: 14px; color: var(--gray); text-align: center; margin-bottom: 32px; }
        
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; font-size: 13px; font-weight: 600; color: var(--dark); margin-bottom: 8px; }
        .input-wrapper { position: relative; }
        .input-wrapper i.bi-lock, .input-wrapper i.bi-lock-fill { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--gray); font-size: 18px; }
        .input-wrapper .toggle-pass { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--gray); }
        .form-control { 
            width: 100%; height: 50px; border-radius: 12px; border: 1.5px solid #e2e8f0; 
            padding: 0 45px 0 48px; font-size: 15px; transition: all 0.2s ease; box-sizing: border-box;
        }
        .form-control:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }
        
        .btn-auth { 
            height: 54px; border-radius: 12px; background: var(--primary); 
            color: #fff; border: none; font-weight: 700; width: 100%; 
            font-size: 16px; transition: all 0.3s ease; margin-top: 12px; cursor: pointer;
        }
        .btn-auth:hover { opacity: 0.9; transform: translateY(-1px); }
        
        .error-message { 
            background: #fef2f2; color: #b91c1c; padding: 12px; border-radius: 10px; 
            font-size: 13px; margin-bottom: 24px; text-align: center; font-weight: 500;
        }
        
        @media (max-width: 500px) {
            .auth-card { padding: 32px 24px; }
        }
    </style>
</head>
<body>

    <a href="/" style="position: absolute; top: 24px; left: 24px; text-decoration: none; color: var(--gray); font-weight: 600; font-size: 14px; display: flex; align-items: center; transition: all 0.2s; opacity: 0.8;" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0.8">
        <i class="bi bi-arrow-left" style="margin-right: 6px; font-size: 18px;"></i> Back to Home
    </a>

    <div class="auth-card">
        <div class="auth-logo">
            <img src="/static/images/logo1.png" alt="SmartApp Logo">
        </div>

        <h1>Secure Your Account</h1>
        <p class="auth-subtitle">Create a strong password to protect your connection.</p>

        <div id="errorMsg" class="error-message" style="display: none;"></div>

        <form method="POST" onsubmit="return validatePassword()">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="form-group">
                <label class="form-label">New Password</label>
                <div class="input-wrapper">
                    <i class="bi bi-lock"></i>
                    <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required oninput="checkStrength(this.value)">
                    <i class="bi bi-eye toggle-pass" onclick="togglePassword('password')"></i>
                </div>
                <!-- Strength Meter -->
                <div style="height: 4px; background: #e2e8f0; margin-top: 8px; border-radius: 10px; overflow: hidden;">
                    <div id="strengthBar" style="height: 100%; width: 0%; transition: all 0.3s ease;"></div>
                </div>
                <div id="strengthText" style="font-size: 11px; margin-top: 4px; font-weight: 600; text-transform: uppercase; color: var(--gray);"></div>
            </div>

            <div class="form-group">
                <label class="form-label">Confirm Password</label>
                <div class="input-wrapper">
                    <i class="bi bi-lock-fill"></i>
                    <input type="password" id="confirm" class="form-control" placeholder="••••••••" required>
                    <i class="bi bi-eye toggle-pass" onclick="togglePassword('confirm')"></i>
                </div>
            </div>

            <button type="submit" class="btn-auth shadow-sm">Finish Registration</button>
        </form>
    </div>

    <script>
        function togglePassword(id) {
            const field = document.getElementById(id);
            const icon = field.nextElementSibling;
            if (field.type === "password") {
                field.type = "text";
                icon.classList.replace("bi-eye", "bi-eye-slash");
            } else {
                field.type = "password";
                icon.classList.replace("bi-eye-slash", "bi-eye");
            }
        }

        function checkStrength(p) {
            const bar = document.getElementById("strengthBar");
            const txt = document.getElementById("strengthText");
            let score = 0;
            if (p.length > 5) score++;
            if (p.length > 8) score++;
            if (/[A-Z]/.test(p) && /[0-9]/.test(p)) score++;
            if (/[^A-Za-z0-9]/.test(p)) score++;

            if (score === 0) { bar.style.width = "0%"; txt.innerText = ""; }
            else if (score === 1) { bar.style.width = "25%"; bar.style.backgroundColor = "#ef4444"; txt.innerText = "Too Weak"; txt.style.color = "#ef4444"; }
            else if (score === 2) { bar.style.width = "50%"; bar.style.backgroundColor = "#f59e0b"; txt.innerText = "Fair"; txt.style.color = "#f59e0b"; }
            else if (score === 3) { bar.style.width = "75%"; bar.style.backgroundColor = "#3b82f6"; txt.innerText = "Strong"; txt.style.color = "#3b82f6"; }
            else { bar.style.width = "100%"; bar.style.backgroundColor = "#10b981"; txt.innerText = "Excellent"; txt.style.color = "#10b981"; }
        }

        function validatePassword() {
            const pass = document.getElementById("password").value;
            const confirm = document.getElementById("confirm").value;

            if (pass !== confirm) {
                showError("Passwords do not match ❌");
                return false;
            }
            if (pass.length < 6) {
                showError("Password must be at least 6 characters");
                return false;
            }
            return true;
        }

        function showError(msg) {
            const error = document.getElementById("errorMsg");
            error.innerText = msg;
            error.style.display = "block";
            setTimeout(() => { error.style.display = "none"; }, 4000);
        }
    </script>

</body>
</html>
