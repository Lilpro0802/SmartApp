{% extends "base_business.html" %}

{% block content %}
<style>
    .dashboard-header { margin-bottom: 24px; }
    .dashboard-header h2 { font-weight: 700; color: var(--dark); margin: 0; font-size: 24px; }
    .dashboard-header p { color: var(--text-gray); margin: 4px 0 0 0; font-size: 14px; }

    .plans-wrapper {
        display: flex;
        flex-direction: column;
        gap: 24px;
    }

    /* TOP CATEGORY MENU */
    .plans-nav {
        display: flex;
        gap: 12px;
        background: #ffffff;
        border-radius: 16px;
        padding: 12px 16px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.02);
        border: 1px solid var(--slate-border);
        width: 100%;
        overflow-x: auto;
    }

    .plan-cat {
        flex: 1; /* evenly fill the container */
        justify-content: center; /* center text */
        padding: 10px 20px;
        border-radius: 10px;
        cursor: pointer;
        font-weight: 500;
        color: var(--text-gray);
        font-size: 14px;
        transition: all 0.2s ease;
        display: flex;
        align-items: center;
        white-space: nowrap;
    }

    .plan-cat i { display: none; } /* Hide the chevron in top nav */

    .plan-cat:hover {
        background: var(--slate);
        color: var(--dark);
    }

    .plan-cat.active {
        background: rgba(37, 99, 235, 0.08);
        color: var(--primary);
        font-weight: 600;
    }

    /* RIGHT SIDE - GRID */
    .plans-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 24px;
        align-items: stretch;
    }

    /* PLAN CARDS */
    .premium-card {
        background: #ffffff;
        border-radius: 20px;
        padding: 32px 24px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
        border: 1px solid var(--slate-border);
        position: relative;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
        display: flex;
        flex-direction: column;
    }

    .premium-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
        border-color: #cbd5e1;
    }

    .premium-card.popular {
        border: 2px solid var(--primary);
    }

    .ribbon {
        position: absolute;
        top: -12px; left: 50%;
        transform: translateX(-50%);
        background: var(--primary);
        color: white;
        padding: 4px 16px;
        border-radius: 20px;
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.05em;
    }

    .pc-speed { font-size: 14px; font-weight: 600; color: var(--primary); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
    .pc-price { font-size: 36px; font-weight: 800; color: var(--dark); margin-bottom: 4px; display: flex; align-items: flex-end; }
    .pc-price span { font-size: 14px; font-weight: 500; color: var(--text-gray); margin-bottom: 8px; margin-left: 4px; }
    .pc-val { font-size: 13px; color: var(--text-gray); margin-bottom: 24px; }

    .pc-features {
        list-style: none; padding: 0; margin: 0 0 32px 0;
        border-top: 1px solid var(--slate-border);
        padding-top: 24px;
    }
    
    .pc-features li {
        display: flex; align-items: flex-start;
        font-size: 13px; color: var(--dark); font-weight: 500; margin-bottom: 12px;
    }
    .pc-features li i {
        color: #10b981; margin-right: 12px; font-size: 16px; margin-top: -1px;
    }

    .btn-buy {
        width: 100%; height: 48px; border-radius: 12px;
        background: rgba(37, 99, 235, 0.1); color: var(--primary);
        border: none; font-weight: 700; font-size: 14px;
        transition: all 0.3s ease; margin-top: auto;
    }
    
    .btn-buy:hover { background: var(--primary); color: white; }
    .premium-card.popular .btn-buy { background: var(--primary); color: white; }
    .premium-card.popular .btn-buy:hover { background: #1d4ed8; }

    @media (max-width: 991px) {
        .plans-grid {
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        }
    }
</style>

<div class="dashboard-header">
    <h2>Office Fiber Plans</h2>
    <p>Dedicated high-speed connectivity with enterprise-grade SLA and static IP support.</p>
</div>

<div class="plans-wrapper">

    <!-- TOP CATEGORY -->
    <div class="plans-nav">
        <div onclick="loadPlans('office')" class="plan-cat active" id="cat-office">SME Office</div>
        <div onclick="loadPlans('enterprise')" class="plan-cat" id="cat-enterprise">Enterprise ILL</div>
        <div onclick="loadPlans('multi')" class="plan-cat" id="cat-multi">Multi-Location</div>
    </div>

    <!-- PLANS GRID -->
    <div class="plans-grid" id="plan-content">
        <!-- JS Injected Content -->
    </div>

</div>

<script>
    function setActive(id) {
        document.querySelectorAll(".plan-cat").forEach(el => el.classList.remove("active"));
        document.getElementById(id).classList.add("active");
    }

    function planCard(speed, price, valText, features, isPopular = false) {
        let fList = features.map(f => `<li><i class="bi bi-check-circle-fill"></i> ${f}</li>`).join('');
        let popClass = isPopular ? "popular" : "";
        let ribbon = isPopular ? `<div class="ribbon">Best Value</div>` : "";

        return `
        <div class="premium-card ${popClass}">
            ${ribbon}
            <div class="pc-speed">${speed}</div>
            <div class="pc-price">₹${price} <span>/ mo</span></div>
            <div class="pc-val">Billed ${valText}</div>
            <ul class="pc-features">
                ${fList}
            </ul>
            <button class="btn-buy">Select Enterprise Plan</button>
        </div>`;
    }

    function loadPlans(type){
        let content = document.getElementById("plan-content");
        
        content.style.opacity = 0;
        
        setTimeout(() => {
            if(type === 'office'){
                setActive('cat-office');
                content.innerHTML = `
                    ${planCard('200 Mbps Office', '2,499', 'Quarterly', ['Symmetric Upload/Download', '1 Static IP Included', 'Business Hours Priority Support', 'Free Professional Install'], true)}
                    ${planCard('100 Mbps Basic', '1,499', 'Quarterly', ['Reliable Fiber Optic', 'Standard SME Router', 'Digital Invoicing', '9 to 6 Field Support'], false)}
                    ${planCard('500 Mbps Pro', '4,999', 'Quarterly', ['High Capacity Fiber', '2 Static IPs Included', 'Next-Day Hardware Swap', 'Managed Wi-Fi Option'], false)}
                `;
            } else if(type === 'enterprise'){
                setActive('cat-enterprise');
                content.innerHTML = `
                    ${planCard('1 Gbps Dedicated', '12,499', 'Monthly', ['Dedicated Internet Leased Line', '99.9% Uptime SLA', 'Dedicated Account Manager', 'BGP Peering Available'], true)}
                    ${planCard('500 Mbps Dedicated', '8,999', 'Monthly', ['Uncontended Leased Line', 'Low Latency for Apps', '24/7 Premium NOC Support', 'Advanced Firewall Included'], false)}
                `;
            } else if(type === 'multi'){
                setActive('cat-multi');
                content.innerHTML = `
                    ${planCard('SD-WAN Starter', '19,999', 'Monthly', ['Connect Up to 3 Branches', 'Centralized Network Control', 'Automatic Failover System', 'Secure VPN Tunneling'], true)}
                    ${planCard('MPLS Basic', '14,999', 'Monthly', ['Point-to-Point Connection', 'Private Layer 2 Network', 'QoS for Voice & Video', 'Scalable Bandwidth'], false)}
                `;
            }
            content.style.opacity = 1;
            content.style.transition = "opacity 0.3s ease";
        }, 150);
    }

    /* DEFAULT LOAD */
    setTimeout(() => {
        loadPlans('office');
    }, 100);
</script>
{% endblock %}
