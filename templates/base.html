<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SmartApp Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- Favicon -->
<link rel="icon" type="image/png" href="/static/images/logo1.png">
<meta name="description" content="Telesmart SmartApp - High-speed fiber broadband management and support.">
<meta name="author" content="Rishit">

<script>
    window.USER_NAME = "{{ session.get('user_name', '') }}";
</script>

<!-- Fonts & Icons -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>
    /* ===== GLOBAL VARIABLES & DEFAULTS ===== */
    :root {
        --primary: #2563eb;
        --secondary: #10b981;
        --dark: #0f172a;
        --slate: #f8fafc;
        --slate-border: #e2e8f0;
        --text-gray: #64748b;
    }

    #rishit-chatbot-root { display: none; }
    
    body {
        margin: 0;
        font-family: 'Inter', sans-serif;
        background-color: var(--slate);
        color: var(--dark);
        opacity: 0; 
        animation: fadeInBody 0.6s ease forwards;
        display: flex;
        min-height: 100vh;
    }
    
    @keyframes fadeInBody { 
        from { opacity: 0; } 
        to { opacity: 1; } 
    }

    /* ===== SIDEBAR (DESKTOP) ===== */
    .sidebar {
        width: 280px;
        background: #f1f5f9; /* Distinct soft slate color to contrast with the main content */
        border-right: 1px solid #e2e8f0;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 24px 20px;
        position: fixed;
        top: 0;
        bottom: 0;
        left: 0;
        box-sizing: border-box;
        overflow: hidden;
        z-index: 1040;
        transition: transform 0.3s ease;
    }
    
    .sidebar-header {
        text-align: center;
        margin-bottom: 32px;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    
    .sidebar-header img {
        width: 180px;
        height: auto;
        max-width: 100%;
        object-fit: contain;
    }

    .nav-label {
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        color: #64748b; /* Darkened from #94a3b8 for readablity */
        letter-spacing: 0.05em;
        margin-bottom: 8px;
        padding-left: 12px;
    }

    .menu-item {
        margin-bottom: 4px;
    }

    .menu-item a {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px;
        color: #334155; /* Stronger text color instead of --text-gray */
        text-decoration: none;
        font-size: 15px; /* Increased font size */
        font-weight: 500;
        border-radius: 12px;
        transition: all 0.2s ease;
    }

    .menu-item a i {
        font-size: 19px; /* Slightly larger icon */
        color: #64748b; /* Darker default icon */
        transition: color 0.2s;
    }

    .menu-item:hover a {
        background: #ffffff; /* Contrast against the slate bg */
        color: #0f172a; /* Nearly black on hover */
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.03); /* Subtle lift */
    }
    
    .menu-item:hover a i {
        color: var(--primary);
    }

    .menu-item.active a {
        background: #ffffff;
        color: var(--primary);
        font-weight: 600;
        box-shadow: 0 4px 12px rgba(37, 99, 235, 0.08); /* Glow effect for active state */
        border: 1px solid rgba(37, 99, 235, 0.1);
    }

    .menu-item.active a i {
        color: var(--primary);
    }

    .menu-divider {
        height: 1px;
        background: #e2e8f0;
        margin: 16px 0;
    }

    .logout a {
        color: #ef4444;
    }
    
    .logout:hover a {
        background: #fef2f2;
        color: #dc2626;
        box-shadow: none;
    }
    
    .logout:hover a i {
        color: #dc2626;
    }

    /* ===== MAIN CONTENT AREA ===== */
    .main-content {
        flex: 1;
        margin-left: 280px;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
    }

    /* ===== MOBILE TOP NAVBAR ===== */
    .mobile-topbar {
        display: none;
        background: #ffffff;
        padding: 16px 20px;
        border-bottom: 1px solid var(--slate-border);
        align-items: center;
        justify-content: space-between;
        position: sticky;
        top: 0;
        z-index: 1030;
    }

    .mobile-topbar img {
        height: 32px;
    }

    .btn-menu {
        background: none;
        border: none;
        font-size: 24px;
        color: var(--dark);
        padding: 0;
    }

    /* ===== CONTENT WRAPPER ===== */
    .content-wrapper {
        padding: 32px 40px;
        flex: 1;
    }

    /* ===== RESPONSIVE BEHAVIOR ===== */
    @media (max-width: 991px) {
        .sidebar {
            transform: translateX(-100%);
        }
        
        .sidebar.show {
            transform: translateX(0);
            box-shadow: 4px 0 24px rgba(0,0,0,0.1);
        }

        .main-content {
            margin-left: 0;
        }

        .mobile-topbar {
            display: flex;
        }

        .content-wrapper {
            padding: 24px 20px;
        }
    }
    
    /* Overlay for mobile sidebar */
    .sidebar-overlay {
        display: none;
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(15, 23, 42, 0.4);
        z-index: 1035;
        opacity: 0;
        transition: opacity 0.3s;
    }
    .sidebar-overlay.show {
        display: block;
        opacity: 1;
    }
</style>
</head>

<body>

<!-- Mobile Sidebar Overlay -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<!-- DESKTOP / OFFCANVAS SIDEBAR -->
<div class="sidebar" id="sidebar">
    <div>
        <div class="sidebar-header">
            <a href="/dashboard">
                <img src="/static/images/logo1.png" alt="SmartApp Logo">
            </a>
        </div>

        <div class="nav-label">Main Menu</div>
        
        <div class="menu-item {% if active=='dashboard' %}active{% endif %}">
            <a href="/dashboard"><i class="bi bi-grid"></i> Overview</a>
        </div>
        
        <div class="menu-item {% if active=='plans' %}active{% endif %}">
            <a href="/plans"><i class="bi bi-briefcase"></i> Browse Plans</a>
        </div>

        <div class="menu-item {% if active=='ekyc' %}active{% endif %}">
            <a href="/kyc"><i class="bi bi-shield-check"></i> Identity (eKYC)</a>
        </div>

        <div class="menu-divider"></div>
        <div class="nav-label">Support</div>

        <div class="menu-item {% if active=='location' %}active{% endif %}">
            <a href="/location"><i class="bi bi-geo-alt"></i> Coverage Check</a>
        </div>

        <div class="menu-item {% if active=='tickets' %}active{% endif %}">
            <a href="/tickets"><i class="bi bi-ticket-detailed"></i> Support Tickets</a>
        </div>

        <div class="menu-item {% if active=='tips' %}active{% endif %}">
            <a href="/tips"><i class="bi bi-router"></i> Troubleshoot</a>
        </div>
        
        <!-- Support chat has been removed per request -->
    </div>

    <div>
        <div class="menu-divider"></div>
        
        <div class="menu-item {% if active=='profile' %}active{% endif %}">
            <a href="/profile"><i class="bi bi-person-circle"></i> Account Settings</a>
        </div>

        <div class="menu-item logout" style="margin-bottom: 16px;">
            <a href="/logout"><i class="bi bi-box-arrow-right"></i> Sign Out</a>
        </div>
    </div>
</div>

<!-- MAIN LAYOUT -->
<div class="main-content">
    
    <!-- MOBILE TOPBAR -->
    <div class="mobile-topbar">
        <a href="/dashboard">
            <img src="/static/images/logo1.png" alt="SmartApp Logo">
        </a>
        <button class="btn-menu" onclick="toggleSidebar()">
            <i class="bi bi-list"></i>
        </button>
    </div>

    <!-- INJECTED CONTENT -->
    <div class="content-wrapper">
        {% block content %}{% endblock %}
    </div>

</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('show');
        const overlay = document.getElementById('sidebarOverlay');
        if (overlay.classList.contains('show')) {
            overlay.classList.remove('show');
            setTimeout(() => overlay.style.display = 'none', 300); // Wait for transition
        } else {
            overlay.style.display = 'block';
            // Force reflow
            void overlay.offsetWidth; 
            overlay.classList.add('show');
        }
    }
</script>

    <!-- Chatbot Integration -->
    <script type="module" src="{{ url_for('static', filename='chatbot/chatbot.js') }}"></script>
</body>
</html>
