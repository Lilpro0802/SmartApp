<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP - SmartApp</title>
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/static/images/logo1.png">
    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #2563eb;
            --dark: #0f172a;
            --gray: #64748b;
        }
        body {
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
            opacity: 0; animation: fadeInBody 0.6s ease forwards;
        }
        @keyframes fadeInBody { from { opacity: 0; } to { opacity: 1; } }
        .auth-card {
            background: #ffffff;
            width: 100%;
            max-width: 440px;
            padding: 48px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.05);
            text-align: center;
        }
        .auth-logo { margin-bottom: 24px; }
        .auth-logo img { height: 60px; }
        h1 { font-size: 24px; font-weight: 700; color: var(--dark); margin-bottom: 8px; }
        .auth-subtitle { font-size: 14px; color: var(--gray); margin-bottom: 32px; line-height: 1.5; }
        
        .otp-container { display: flex; justify-content: center; gap: 10px; margin-bottom: 24px; }
        .otp-box {
            width: 48px; height: 56px; border-radius: 12px; border: 1.5px solid #e2e8f0;
            text-align: center; font-size: 20px; font-weight: 700; color: var(--dark);
            transition: all 0.2s ease;
        }
        .otp-box:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }

        .btn-auth { 
            height: 54px; border-radius: 12px; background: var(--primary); 
            color: #fff; border: none; font-weight: 700; width: 100%; 
            font-size: 16px; transition: all 0.3s ease; cursor: pointer;
        }
        .btn-auth:hover { opacity: 0.9; transform: translateY(-1px); }
        
        .timer-info { font-size: 13px; color: var(--gray); margin-top: 24px; }
        .resend-link { 
            display: inline-block; margin-top: 8px; font-size: 14px; color: var(--primary); 
            text-decoration: none; font-weight: 600; cursor: pointer; border: none; background: none;
        }
        .resend-link.disabled { color: #cbd5e1; cursor: not-allowed; }

        .error-message { color: #b91c1c; font-size: 13px; margin-bottom: 16px; font-weight: 500; }
        
        @media (max-width: 500px) {
            .auth-card { padding: 32px 20px; }
            .otp-box { width: 40px; height: 50px; font-size: 18px; }
        }
    </style>
</head>
<body>

    <a href="/" style="position: absolute; top: 24px; left: 24px; text-decoration: none; color: var(--gray); font-weight: 600; font-size: 14px; display: flex; align-items: center; transition: all 0.2s; opacity: 0.8;" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0.8">
        <i class="bi bi-arrow-left" style="margin-right: 6px; font-size: 18px;"></i> Back to Home
    </a>

    <div class="auth-card">
        <div class="auth-logo">
            <img src="/static/images/logo1.png" alt="SmartApp Logo">
        </div>

        <h1>Verify Your Email</h1>
        <p class="auth-subtitle">We've sent a 6-digit code to your inbox. Enter it below to continue.</p>

        {% if error %}
        <p class="error-message">{{ error }}</p>
        {% endif %}

        <form method="POST" onsubmit="combineOTP()">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <input type="hidden" name="otp" id="finalOTP">

            <div class="otp-container">
                <input type="text" maxlength="1" class="otp-box" required>
                <input type="text" maxlength="1" class="otp-box" required>
                <input type="text" maxlength="1" class="otp-box" required>
                <input type="text" maxlength="1" class="otp-box" required>
                <input type="text" maxlength="1" class="otp-box" required>
                <input type="text" maxlength="1" class="otp-box" required>
            </div>

            <button type="submit" class="btn-auth shadow-sm">Verify OTP →</button>
        </form>

        <div class="timer-info">
            Expires in <span id="countdown" style="font-weight: 700; color: var(--dark);">30</span> seconds
        </div>
        <button id="resendBtn" class="resend-link disabled" onclick="resendOTP()">Resend Code</button>
    </div>

    <script>
        const inputs = document.querySelectorAll(".otp-box");
        inputs[0].focus();

        inputs.forEach((input, index) => {
            input.addEventListener("input", (e) => {
                input.value = input.value.replace(/[^0-9]/g, '');
                if (input.value && index < inputs.length - 1) inputs[index + 1].focus();
            });
            input.addEventListener("keydown", (e) => {
                if (e.key === "Backspace" && !input.value && index > 0) inputs[index - 1].focus();
            });
            input.addEventListener("paste", (e) => {
                let paste = e.clipboardData.getData("text");
                if (paste.length === 6) {
                    inputs.forEach((input, i) => input.value = paste[i]);
                }
            });
        });

        function combineOTP() {
            let otp = "";
            inputs.forEach(i => otp += i.value);
            document.getElementById("finalOTP").value = otp;
        }

        let time = 30;
        let resendBtn = document.getElementById("resendBtn");
        let timer = setInterval(() => {
            time--;
            document.getElementById("countdown").innerText = time;
            if (time <= 0) {
                clearInterval(timer);
                document.getElementById("countdown").innerText = "0";
                resendBtn.classList.remove("disabled");
            }
        }, 1000);

        function resendOTP() {
            if (!resendBtn.classList.contains("disabled")) location.reload();
        }
    </script>

    <!-- Chatbot Integration -->
    <script type='module' src='{{ url_for('static', filename='chatbot/chatbot.js') }}'></script>
</body>
</html>
